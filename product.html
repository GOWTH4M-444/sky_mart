<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyMart - Online Shopping</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f3f3;
}

/* NAVBAR */
.navbar{
    background:#0f1111;
    color:white;
    padding:12px 20px;
    display:flex;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#00d4ff;
}

.search-box{
    flex:1;
    display:flex;
    gap:5px;
}

.search-box input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:4px;
}

.search-box button{
    padding:10px 15px;
    background:orange;
    border:none;
    cursor:pointer;
    border-radius:4px;
}

.nav-link{
    text-decoration:none;
    color:white;
    font-weight:bold;
    padding:8px;
}

.nav-link:hover{
    color:orange;
}

.signin-btn{
    background:#00d4ff;
    color:black;
    border-radius:5px;
    padding:8px 12px;
}

.cart-link{
    text-decoration:none;
    color:white;
    background:orange;
    padding:10px 15px;
    border-radius:4px;
    font-weight:bold;
}

/* DROPDOWN */
.dropdown-menu{
    position:relative;
}

.nav-btn{
    background:none;
    border:none;
    color:white;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;
}

.dropdown-content{
    display:none;
    position:absolute;
    background:white;
    min-width:180px;
    top:30px;
    left:0;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
    z-index:1000;
    border-radius:5px;
}

.dropdown-content a{
    display:block;
    padding:10px;
    text-decoration:none;
    color:black;
}

.dropdown-content a:hover{
    background:#f1f1f1;
}

.dropdown-menu:hover .dropdown-content{
    display:block;
}

/* PRODUCTS */
.container{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:12px;
}

.price{
    color:green;
    font-size:18px;
    font-weight:bold;
    margin:8px 0;
}

.btn-group{
    display:flex;
    gap:5px;
    margin-top:10px;
}

.btn{
    flex:1;
    background:orange;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.buy-btn{
    flex:1;
    background:green;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.no-products{
    text-align:center;
    font-size:22px;
    margin-top:30px;
}

@media(max-width:900px){
    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:500px){
    .grid{
        grid-template-columns:1fr;
    }

    .navbar{
        flex-direction:column;
        align-items:stretch;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">SkyMart</div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search products...">
        <button onclick="searchProducts()">Search</button>
    </div>

    <a href="#" class="nav-link" onclick="showProducts()">Home</a>

    <div class="dropdown-menu">
        <button class="nav-btn">Categories ▼</button>

        <div class="dropdown-content">
            <a href="#" onclick="filterCategory('Dresses')">Dresses</a>
            <a href="#" onclick="filterCategory('Sarees')">Sarees</a>
            <a href="#" onclick="filterCategory('Bags')">Bags</a>
            <a href="#" onclick="filterCategory('Phones')">Phones</a>
            <a href="#" onclick="filterCategory('Electronics')">Electronics</a>
            <a href="#" onclick="filterCategory('Footwear')">Footwear</a>
            <a href="#" onclick="showProducts()">All Products</a>
        </div>
    </div>

    <a href="#" class="nav-link" onclick="openOrders()">My Orders</a>

    <a href="#" class="nav-link" onclick="openAccount()">Account</a>

    <a href="#" class="nav-link signin-btn" onclick="signIn()">
        Sign In
    </a>

    <a href="cart.html" class="cart-link">
        Cart 🛒 (<span id="cartCount">0</span>)
    </a>

</div>

<!-- PRODUCTS -->
<div class="container">
    <div class="grid" id="productContainer"></div>
</div>

<script>

/* PRODUCTS */
const products = [
{id:1,name:"Floral Dress",category:"Dresses",price:799,img:"https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=500"},
{id:2,name:"Party Dress",category:"Dresses",price:1299,img:"https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=500"},
{id:3,name:"Silk Saree",category:"Sarees",price:1999,img:"https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=500"},
{id:4,name:"Cotton Saree",category:"Sarees",price:999,img:"https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=500"},
{id:5,name:"Handbag",category:"Bags",price:899,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500"},
{id:6,name:"Backpack",category:"Bags",price:499,img:"https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=500"},
{id:7,name:"Smartphone",category:"Phones",price:12999,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500"},
{id:8,name:"Android Phone",category:"Phones",price:6999,img:"https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=500"},
{id:9,name:"Laptop",category:"Electronics",price:45999,img:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500"},
{id:10,name:"Smart Watch",category:"Electronics",price:2999,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500"},
{id:11,name:"Wireless Earbuds",category:"Electronics",price:1499,img:"https://images.unsplash.com/photo-1572569511254-d8f925fe2cbb?w=500"},
{id:12,name:"Sports Shoes",category:"Footwear",price:1999,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500"}
];

/* DISPLAY PRODUCTS */
function showProducts(list = products){

    let html = "";

    if(list.length === 0){
        document.getElementById("productContainer").innerHTML =
        "<div class='no-products'>No Products Found</div>";
        return;
    }

    list.forEach(product => {

        html += `
        <div class="card">
            <img src="${product.img}" alt="${product.name}">

            <div class="card-content">
                <h3>${product.name}</h3>
                <p>${product.category}</p>

                <p class="price">₹${product.price}</p>

                <div class="btn-group">
                    <button class="btn"
                        onclick="addToCart(${product.id})">
                        Add To Cart
                    </button>

                    <button class="buy-btn"
                        onclick="buyNow(${product.id})">
                        Buy Now
                    </button>
                </div>
            </div>
        </div>
        `;
    });

    document.getElementById("productContainer").innerHTML = html;
}

/* SEARCH */
function searchProducts(){

    let query = document
        .getElementById("searchInput")
        .value
        .toLowerCase();

    let filtered = products.filter(product =>
        product.name.toLowerCase().includes(query) ||
        product.category.toLowerCase().includes(query)
    );

    showProducts(filtered);
}

document.getElementById("searchInput")
.addEventListener("keyup", function(e){
    if(e.key === "Enter"){
        searchProducts();
    }
});

/* CATEGORY FILTER */
function filterCategory(category){

    let filtered = products.filter(product =>
        product.category === category
    );

    showProducts(filtered);
}

/* ADD TO CART */
function addToCart(id){

    const product = products.find(p => p.id === id);

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    let existing =
    cart.find(item => item.id === id);

    if(existing){
        existing.qty++;
    }
    else{
        cart.push({
            ...product,
            qty:1
        });
    }

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    updateCartCount();

    alert(product.name + " added to cart!");
}

/* BUY NOW */
function buyNow(id){

    const product =
    products.find(p => p.id === id);

    alert(
        "Thank you for purchasing " +
        product.name +
        "\nPrice: ₹" +
        product.price
    );
}

/* CART COUNT */
function updateCartCount(){

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    let count =
    cart.reduce((total,item)=>
    total + item.qty,0);

    document.getElementById("cartCount")
    .innerText = count;
}

/* LOGIN CHECK */
function isLoggedIn(){
    return localStorage.getItem("loggedIn")
    === "true";
}

/* SIGN IN */
function signIn(){
    window.location.href = "index.html";
}

/* MY ORDERS */
function openOrders(){

    if(!isLoggedIn()){
        alert("Please sign in first.");
        return;
    }

    window.location.href = "orders.html";
}

/* ACCOUNT */
function openAccount(){

    if(!isLoggedIn()){
        alert("Please sign in first.");
        return;
    }

    window.location.href = "account.html";
}

/* INITIAL LOAD */
showProducts();
updateCartCount();

</script>

</body>
</html>
