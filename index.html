<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyMart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background: radial-gradient(circle at top,#60A5FA,#2563EB 40%,#0F172A 100%);
position:relative;
color:white;
}

/* glowing background orbs */
.blob{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.4;
animation:floatBlob 12s infinite ease-in-out alternate;
}

.blob1{
width:350px;
height:350px;
background:#3B82F6;
top:-120px;
left:-120px;
}

.blob2{
width:300px;
height:300px;
background:#FBBF24;
bottom:-120px;
right:-120px;
}

@keyframes floatBlob{
from{transform:translateY(0px) scale(1);}
to{transform:translateY(60px) scale(1.1);}
}

/* main container */
.container{
width:90%;
max-width:1200px;
display:flex;
justify-content:space-between;
align-items:center;
gap:60px;
z-index:2;
}

/* LEFT SECTION */
.left{
flex:1;
}

.badge{
display:inline-block;
padding:10px 18px;
border-radius:50px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
font-size:13px;
letter-spacing:1px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.2);
}

h1{
font-size:85px;
font-weight:800;
line-height:1;
}

h1 span{
color:#FBBF24;
text-shadow:0 0 20px rgba(251,191,36,0.7);
}

.subtitle{
margin-top:20px;
font-size:18px;
line-height:1.8;
max-width:600px;
opacity:0.9;
}

/* buttons */
.buttons{
margin-top:35px;
display:flex;
gap:18px;
}

.btn{
padding:14px 30px;
border-radius:12px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.3s;
border:none;
}

.primary{
background:linear-gradient(135deg,#ffffff,#dbeafe);
color:#1d4ed8;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.primary:hover{
transform:translateY(-5px) scale(1.03);
}

.secondary{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
color:white;
border:1px solid rgba(255,255,255,0.3);
}

.secondary:hover{
transform:translateY(-5px) scale(1.03);
}

/* stats */
.stats{
display:flex;
gap:20px;
margin-top:50px;
flex-wrap:wrap;
}

.stat{
padding:18px 22px;
border-radius:18px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
min-width:140px;
text-align:center;
transition:0.3s;
border:1px solid rgba(255,255,255,0.15);
}

.stat:hover{
transform:translateY(-5px);
background:rgba(255,255,255,0.18);
}

.stat h2{
font-size:28px;
}

/* RIGHT SECTION */
.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.cart{
width:420px;
animation:float 4s infinite ease-in-out;
filter:drop-shadow(0 20px 30px rgba(0,0,0,0.4));
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-25px);}
}

/* floating products */
.product{
position:absolute;
width:85px;
height:85px;
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
border-radius:22px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
animation:float 5s infinite ease-in-out;
transition:0.3s;
}

.product:hover{
transform:scale(1.2) rotate(5deg);
}

.p1{top:10px;left:40px;}
.p2{top:120px;right:10px;}
.p3{bottom:120px;left:0;}
.p4{bottom:20px;right:50px;}
.p5{top:250px;right:-20px;}

/* RESPONSIVE */
@media(max-width:900px){

.container{
flex-direction:column;
text-align:center;
}

h1{font-size:55px;}

.subtitle{font-size:15px;}

.buttons{justify-content:center;}

.cart{width:260px;}

.product{
width:65px;
height:65px;
font-size:28px;
}
}

</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="badge">⚡ Premium Shopping Experience</div>

<h1>Sky<span>Mart</span></h1>

<p class="subtitle">
Your one-stop destination for fashion, electronics, beauty, groceries and more.
Fast delivery, best prices, and a seamless shopping experience.
</p>

<div class="buttons">
<button class="btn primary" onclick="location.href='login.html'">Sign In</button>
<button class="btn secondary" onclick="location.href='register.html'">Create Account</button>
</div>

<div class="stats">

<div class="stat">
<h2>1M+</h2>
<p>Products</p>
</div>

<div class="stat">
<h2>500K+</h2>
<p>Customers</p>
</div>

<div class="stat">
<h2>24/7</h2>
<p>Support</p>
</div>

</div>

</div>

<!-- RIGHT -->
<div class="right">

<img class="cart"
src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png"
alt="cart">

<div class="product p1">👕</div>
<div class="product p2">📱</div>
<div class="product p3">👟</div>
<div class="product p4">🎧</div>
<div class="product p5">🛍️</div>

</div>

</div>

</body>
</html>
