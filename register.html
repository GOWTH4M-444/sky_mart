<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Mart - Create Account</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#6C63FF;
    --secondary:#87CEEB;
    --accent:#FFB6C1;
    --dark:#1E293B;
    --light:#F8FAFC;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#F8FAFC;
}

/* HEADER */
header{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    padding:25px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:100;
}

.logo{
    font-size:30px;
    font-weight:700;
    background:linear-gradient(90deg,#6C63FF,#87CEEB,#FFB6C1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.signin-btn{
    text-decoration:none;
    color:#fff;
    background:rgba(108,99,255,0.7);
    padding:12px 22px;
    border-radius:30px;
    transition:.3s;
}

.signin-btn:hover{
    background:#6C63FF;
}

/* MAIN */
.container{
    display:flex;
    min-height:100vh;
}

/* LEFT */
.left{
    flex:1.2;
    position:relative;
    background:
    linear-gradient(rgba(108,99,255,.7),rgba(135,206,235,.6)),
    url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1800&q=80');
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero-content{
    color:white;
    width:80%;
}

.hero-content h1{
    font-size:56px;
    margin-bottom:15px;
}

.hero-content p{
    font-size:17px;
    opacity:.95;
    margin-bottom:30px;
}

/* RIGHT */
.right{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
}

.card{
    width:100%;
    max-width:480px;
    background:white;
    padding:40px;
    border-radius:24px;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
}

/* FORM */
.form-group{
    position:relative;
    margin-bottom:18px;
}

.form-group input{
    width:100%;
    padding:16px;
    border:1px solid #DCE3EC;
    border-radius:14px;
    outline:none;
}

.form-group input:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(108,99,255,.15);
}

.form-group label{
    position:absolute;
    left:14px;
    top:16px;
    background:white;
    padding:0 5px;
    color:#64748B;
    transition:.3s;
}

.form-group input:focus + label,
.form-group input:valid + label{
    top:-10px;
    font-size:12px;
    color:var(--primary);
}

/* BUTTON */
.create-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    background:linear-gradient(90deg,#6C63FF,#87CEEB,#FFB6C1);
    transition:.3s;
}

.create-btn:hover{
    transform:translateY(-2px);
}

/* SOCIAL */
.social button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid #E2E8F0;
    background:white;
    cursor:pointer;
}

/* TOAST MESSAGE */
.toast{
    position:fixed;
    top:20px;
    right:20px;
    padding:14px 18px;
    border-radius:10px;
    color:white;
    font-size:14px;
    font-weight:500;
    opacity:0;
    transform:translateX(100px);
    transition:.4s;
    z-index:9999;
}

.toast.show{
    opacity:1;
    transform:translateX(0);
}

.toast.success{background:#10B981;}
.toast.error{background:#EF4444;}

/* RESPONSIVE */
@media(max-width:768px){
    .container{flex-direction:column;}
    .left{display:none;}
}

</style>
</head>

<body>

<header>
<div class="logo">☁️ Sky Mart</div>
<a href="login.html" class="signin-btn">Sign In</a>
</header>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<div class="container">

<!-- LEFT -->
<div class="left">
<div class="hero-content">
<h1>Join Sky Mart</h1>
<p>Millions of products. Best prices. Fast delivery.</p>
</div>
</div>

<!-- RIGHT -->
<div class="right">

<div class="card">

<h2>Create Account</h2>

<form onsubmit="return registerUser(event)">

<div class="form-group">
<input type="text" id="name" required>
<label>Full Name</label>
</div>

<div class="form-group">
<input type="email" id="email" required>
<label>Email Address</label>
</div>

<div class="form-group">
<input type="tel" id="phone" required>
<label>Mobile Number</label>
</div>

<div class="form-group">
<input type="password" id="password" required>
<label>Password</label>
</div>

<div class="form-group">
<input type="password" id="confirm" required>
<label>Confirm Password</label>
</div>

<button class="create-btn">Create Account</button>

</form>

</div>

</div>

</div>

<script>

function showToast(message,type){
    const toast=document.getElementById("toast");

    toast.innerText=message;
    toast.className="toast "+type;
    toast.classList.add("show");

    setTimeout(()=>{
        toast.classList.remove("show");
    },3000);
}

function registerUser(event){
    event.preventDefault();

    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;
    let phone=document.getElementById("phone").value;
    let password=document.getElementById("password").value;
    let confirm=document.getElementById("confirm").value;

    if(name===""||email===""||phone===""||password===""||confirm===""){
        showToast("Please fill all fields","error");
        return false;
    }

    if(password.length<6){
        showToast("Password must be at least 6 characters","error");
        return false;
    }

    if(password!==confirm){
        showToast("Passwords do not match","error");
        return false;
    }

    showToast("Account created successfully 🎉","success");

    setTimeout(()=>{
        window.location.href="login.html";
    },1500);

    return false;
}

</script>

</body>
</html>
