<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    background:orange;
    color:black;
    padding:10px 15px;
    border-radius:5px;
    font-weight:bold;
}

.back-btn:hover{
    background:#ff9800;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.cart-item{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.item-left{
    display:flex;
    gap:15px;
    align-items:center;
}

.item-left img{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:8px;
}

.item-details h3{
    margin-bottom:8px;
    color:#333;
}

.item-details p{
    margin:5px 0;
}

.quantity-controls{
    margin-top:10px;
}

.quantity-controls button{
    padding:5px 12px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin:0 5px;
}

.quantity-controls button:hover{
    background:#0056b3;
}

.remove-btn{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    background:red;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.remove-btn:hover{
    background:darkred;
}

.item-total{
    font-size:22px;
    font-weight:bold;
    color:green;
}

.total-section{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
    text-align:right;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.total-price{
    font-size:28px;
    font-weight:bold;
    margin-bottom:15px;
}

.buy-btn{
    padding:12px 25px;
    border:none;
    background:green;
    color:white;
    border-radius:5px;
    cursor:pointer;
    font-size:18px;
}

.buy-btn:hover{
    background:darkgreen;
}

.empty-cart{
    text-align:center;
    font-size:24px;
    color:#777;
    margin-top:50px;
}

@media(max-width:768px){

    .cart-item{
        flex-direction:column;
        align-items:flex-start;
    }

    .item-left{
        flex-direction:column;
        align-items:flex-start;
    }

    .item-left img{
        width:180px;
        height:auto;
    }

    .item-total{
        align-self:flex-end;
    }

    .total-section{
        text-align:center;
    }
}
</style>
</head>

<body>

<a href="product.html" class="back-btn">
    ← Continue Shopping
</a>

<h1>🛒 Your Shopping Cart</h1>

<div id="cartContainer"></div>

<div id="totalSection"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/*
Sample data for testing.
Remove this block if products are already added from product page.
*/
if(cart.length === 0){
    cart = [
        {
            name:"Wireless Headphones",
            price:1499,
            qty:1,
            img:"https://via.placeholder.com/100"
        },
        {
            name:"Smart Watch",
            price:2499,
            qty:2,
            img:"https://via.placeholder.com/100"
        }
    ];

    localStorage.setItem("cart", JSON.stringify(cart));
}

function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function increaseQty(index){
    cart[index].qty++;
    saveCart();
}

function decreaseQty(index){

    if(cart[index].qty > 1){
        cart[index].qty--;
    }else{
        if(confirm("Remove item from cart?")){
            cart.splice(index,1);
        }
    }

    saveCart();
}

function removeItem(index){

    if(confirm("Remove this item from cart?")){
        cart.splice(index,1);
        saveCart();
    }
}

function buyNow(){

    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }

    let total = cart.reduce((sum,item)=>{
        return sum + (item.price * item.qty);
    },0);

    alert(
        "Order Placed Successfully 🎉\n\n" +
        "Total Amount: ₹" + total
    );

    localStorage.removeItem("cart");

    window.location.href = "index.html";
}

function renderCart(){

    const container = document.getElementById("cartContainer");
    const totalSection = document.getElementById("totalSection");

    container.innerHTML = "";
    totalSection.innerHTML = "";

    if(cart.length === 0){

        container.innerHTML = `
            <div class="empty-cart">
                🛒 Your cart is empty
            </div>
        `;

        return;
    }

    let grandTotal = 0;

    cart.forEach((item,index)=>{

        let subtotal = item.price * item.qty;
        grandTotal += subtotal;

        container.innerHTML += `
        <div class="cart-item">

            <div class="item-left">

                <img src="${item.img}" alt="${item.name}">

                <div class="item-details">

                    <h3>${item.name}</h3>

                    <p>
                        <strong>Price:</strong>
                        ₹${item.price}
                    </p>

                    <p>
                        <strong>Quantity:</strong>
                        ${item.qty}
                    </p>

                    <div class="quantity-controls">

                        <button onclick="decreaseQty(${index})">
                            −
                        </button>

                        <button onclick="increaseQty(${index})">
                            +
                        </button>

                    </div>

                    <button class="remove-btn"
                    onclick="removeItem(${index})">
                        Remove
                    </button>

                </div>

            </div>

            <div class="item-total">
                ₹${subtotal}
            </div>

        </div>
        `;
    });

    totalSection.innerHTML = `
        <div class="total-section">

            <div class="total-price">
                Total: ₹${grandTotal}
            </div>

            <button class="buy-btn"
            onclick="buyNow()">
                Buy Now
            </button>

        </div>
    `;
}

renderCart();

</script>

</body>
</html>
